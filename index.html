<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <base target="_top">

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      padding: 20px;
      background: #f3f5f7;
      color: #222;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      padding: 24px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.12);
    }

    /* 
     * 強制標題維持在單一整行，絕不折行
     */
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
      white-space: nowrap; /* 強制不折行 */
      overflow: hidden;    /* 防止溢出 */
      text-overflow: clip; 
    }

    .notice {
      margin-top: 8px;
      margin-bottom: 18px;
      color: #555;
      font-size: 18px;
      font-weight: bold;
    }

    /* 調整後按鈕區塊與簽名板的間距 */
    .buttons {
      display: flex;
      gap: 14px;
      margin-bottom: 18px;
    }

    /* 調整後人數統計區塊與簽名板的間距 */
    .count-box {
      margin-top: 18px;
      margin-bottom: 18px;
      padding: 13px 16px;
      background: #eef5ff;
      border: 1px solid #d2e3fc;
      border-radius: 10px;
      color: #1a73e8;
      font-size: 20px;
      font-weight: bold;
    }

    #signInCount {
      display: inline-block;
      min-width: 36px;
      font-size: 25px;
    }

    .canvas-box {
      width: 100%;
      height: 330px;
      overflow: hidden;
      background: #ffffff;
      border: 3px solid #333;
      border-radius: 10px;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      touch-action: none;
    }

    button {
      flex: 1;
      min-height: 58px;
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
    }

    #clearButton {
      background: #e5e7eb;
      color: #222;
    }

    #submitButton {
      background: #1a73e8;
      color: #ffffff;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #message {
      min-height: 32px;
      margin-top: 18px;
      font-size: 20px;
      font-weight: bold;
    }

    .error {
      color: #d93025;
    }

    /*
     * 完成彈窗背景
     */
    .modal-overlay {
      display: none;
      position: fixed;
      z-index: 9999;
      inset: 0;
      width: 100%;
      height: 100%;
      padding: 20px;
      background: rgba(0, 0, 0, 0.55);
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show {
      display: flex;
    }

    /*
     * 完成彈窗內容
     */
    .modal-box {
      width: 100%;
      max-width: 420px;
      padding: 30px 24px 24px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.30);
      text-align: center;
    }

    .success-icon {
      display: flex;
      width: 76px;
      height: 76px;
      margin: 0 auto 18px;
      background: #188038;
      border-radius: 50%;
      color: #ffffff;
      font-size: 48px;
      font-weight: bold;
      align-items: center;
      justify-content: center;
    }

    .modal-title {
      margin-bottom: 18px;
      color: #188038;
      font-size: 30px;
      font-weight: bold;
    }

    .modal-time {
      margin-bottom: 12px;
      color: #333;
      font-size: 22px;
      line-height: 1.7;
    }

    .modal-count {
      margin-bottom: 24px;
      padding: 12px;
      background: #eef5ff;
      border-radius: 10px;
      color: #1a73e8;
      font-size: 20px;
      font-weight: bold;
    }

    #confirmButton {
      width: 100%;
      min-height: 58px;
      background: #1a73e8;
      color: #ffffff;
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
      }

      .container {
        padding: 16px;
      }

      /* 手機窄螢幕下自動依寬度縮放字體，確保維持在同一行不佔空間 */
      h1 {
        font-size: 5.5vw; 
      }

      .notice {
        font-size: 16px;
      }

      .count-box {
        font-size: 18px;
      }

      #signInCount {
        font-size: 23px;
      }

      .canvas-box {
        height: 300px;
      }

      button {
        min-height: 56px;
        font-size: 20px;
      }

      .modal-title {
        font-size: 27px;
      }

      .modal-time {
        font-size: 20px;
      }

      .modal-count {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- 標題：在任何設備上均會自適應縮放並維持在一整行 -->
    <h1>台南市老宅延壽宣導說明會</h1>
    
    <div class="notice">請在下方空白處簽名</div>

    <!-- 清除與送出按鈕（置於上方） -->
    <div class="buttons">
      <button id="clearButton" type="button">
        清除重簽
      </button>

      <button id="submitButton" type="button">
        送出簽到
      </button>
    </div>

    <!-- 簽名畫布 -->
    <div class="canvas-box">
      <canvas id="signatureCanvas"></canvas>
    </div>

    <!-- 人數統計區塊（置於下方） -->
    <div class="count-box">
      目前已完成電子簽到：
      <span id="signInCount">讀取中</span>
      人
    </div>

    <div id="message"></div>
  </div>

  <!-- 簽到成功彈窗 -->
  <div id="successModal" class="modal-overlay">
    <div class="modal-box">
      <div class="success-icon">✓</div>

      <div class="modal-title">
        簽到完成
      </div>

      <div id="successTime" class="modal-time"></div>

      <div id="successCount" class="modal-count"></div>

      <button id="confirmButton" type="button">
        確定
      </button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('signatureCanvas');
    const context = canvas.getContext('2d');

    const clearButton =
      document.getElementById('clearButton');

    const submitButton =
      document.getElementById('submitButton');

    const message =
      document.getElementById('message');

    const signInCount =
      document.getElementById('signInCount');

    const successModal =
      document.getElementById('successModal');

    const successTime =
      document.getElementById('successTime');

    const successCount =
      document.getElementById('successCount');

    const confirmButton =
      document.getElementById('confirmButton');

    let drawing = false;
    let hasSignature = false;
    let currentCount = 0; // 用於在本地端進行即時計數

    /**
     * 設定簽名板尺寸
     */
    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;

      let oldImage = null;

      if (
        canvas.width > 0 &&
        canvas.height > 0 &&
        hasSignature
      ) {
        oldImage = canvas.toDataURL('image/png');
      }

      canvas.width = Math.round(rect.width * ratio);
      canvas.height = Math.round(rect.height * ratio);

      context.setTransform(
        ratio,
        0,
        0,
        ratio,
        0,
        0
      );

      context.lineWidth = 3;
      context.lineCap = 'round';
      context.lineJoin = 'round';
      context.strokeStyle = '#000000';

      if (oldImage) {
        const image = new Image();

        image.onload = function () {
          context.drawImage(
            image,
            0,
            0,
            rect.width,
            rect.height
          );
        };

        image.src = oldImage;
      }
    }

    /**
     * 取得滑鼠或手指座標
     */
    function getPosition(event) {
      const rect = canvas.getBoundingClientRect();

      let point = event;

      if (event.touches && event.touches.length > 0) {
        point = event.touches[0];
      } else if (
        event.changedTouches &&
        event.changedTouches.length > 0
      ) {
        point = event.changedTouches[0];
      }

      return {
        x: point.clientX - rect.left,
        y: point.clientY - rect.top
      };
    }

    function startDrawing(event) {
      event.preventDefault();

      drawing = true;
      hasSignature = true;

      const position = getPosition(event);

      context.beginPath();
      context.moveTo(position.x, position.y);
    }

    function draw(event) {
      if (!drawing) {
        return;
      }

      event.preventDefault();

      const position = getPosition(event);

      context.lineTo(position.x, position.y);
      context.stroke();
    }

    function stopDrawing(event) {
      if (event) {
        event.preventDefault();
      }

      drawing = false;
      context.closePath();
    }

    /**
     * 清除簽名
     */
    function clearSignature() {
      context.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
      );

      hasSignature = false;

      message.textContent = '';
      message.className = '';
    }

    /**
     * 讀取目前簽到人數
     */
    function loadSignInCount() {
      signInCount.textContent = '讀取中';

      google.script.run
        .withSuccessHandler(function (count) {
          currentCount = Number(count); // 紀錄真實人數
          signInCount.textContent = currentCount;
        })
        .withFailureHandler(function (error) {
          console.error(error);
          signInCount.textContent = '-';
        })
        .getSignInCount();
    }

    /**
     * 顯示成功彈窗
     */
    function showSuccessModal(result) {
      successTime.innerHTML =
        result.date +
        '<br>' +
        result.time;

      successCount.textContent =
        '目前已完成電子簽到：' +
        result.count +
        ' 人';

      successModal.classList.add('show');
    }

    /**
     * 關閉成功彈窗
     */
    function closeSuccessModal() {
      successModal.classList.remove('show');

      clearSignature();

      submitButton.disabled = false;
      clearButton.disabled = false;
    }

    /**
     * 送出簽名（秒速完成版 - 樂觀 UI）
     */
    function submitSignature() {
      if (!hasSignature) {
        message.textContent = '請先簽名再送出';
        message.className = 'error';
        return;
      }

      // 1. 鎖定按鈕避免連點
      submitButton.disabled = true;
      clearButton.disabled = true;

      // 2. 本地端立即取得目前時間（簽到成功彈窗使用）
      const now = new Date();
      const dateText = now.getFullYear() + '/' + 
        String(now.getMonth() + 1).padStart(2, '0') + '/' + 
        String(now.getDate()).padStart(2, '0');
      const timeText = String(now.getHours()).padStart(2, '0') + ':' + 
        String(now.getMinutes()).padStart(2, '0') + ':' + 
        String(now.getSeconds()).padStart(2, '0');

      // 3. 本地人數立即 +1（不需要等伺服器回傳）
      currentCount++;
      signInCount.textContent = currentCount;

      const imageData = canvas.toDataURL('image/png');

      // 4. 【極致體驗】秒速彈出成功視窗！
      showSuccessModal({
        date: dateText,
        time: timeText,
        count: currentCount
      });

      // 5. 在背景悄悄上傳至 Google 伺服器
      google.script.run
        .withSuccessHandler(function (result) {
          console.log('背景上傳成功，真實序號：' + result.count);
          // 伺服器儲存成功後，同步最精準的真實資料庫人數（防止多人同時送出時的數字偏差）
          currentCount = Number(result.count);
          signInCount.textContent = currentCount;
        })
        .withFailureHandler(function (error) {
          console.error('背景儲存失敗:', error);
          // 若真的上傳失敗，在背景提示管理員，但不干擾下一位簽到者的操作
          message.textContent = '警告：有上一筆資料背景上傳失敗，請檢查網路。';
          message.className = 'error';
        })
        .saveSignature(imageData);
    }

    /*
     * 電腦滑鼠事件
     */
    canvas.addEventListener(
      'mousedown',
      startDrawing
    );

    canvas.addEventListener(
      'mousemove',
      draw
    );

    canvas.addEventListener(
      'mouseup',
      stopDrawing
    );

    canvas.addEventListener(
      'mouseleave',
      stopDrawing
    );

    /*
     * 手機觸控事件
     */
    canvas.addEventListener(
      'touchstart',
      startDrawing,
      {
        passive: false
      }
    );

    canvas.addEventListener(
      'touchmove',
      draw,
      {
        passive: false
      }
    );

    canvas.addEventListener(
      'touchend',
      stopDrawing,
      {
        passive: false
      }
    );

    canvas.addEventListener(
      'touchcancel',
      stopDrawing,
      {
        passive: false
      }
    );

    clearButton.addEventListener(
      'click',
      clearSignature
    );

    submitButton.addEventListener(
      'click',
      submitSignature
    );

    confirmButton.addEventListener(
      'click',
      closeSuccessModal
    );

    window.addEventListener(
      'load',
      function () {
        resizeCanvas();
        loadSignInCount();
      }
    );

    window.addEventListener(
      'resize',
      resizeCanvas
    );
  </script>
</body>
</html>
