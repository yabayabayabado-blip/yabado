<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; min-height: 100%; }
    body {
      background: #eef3f8;
      color: #17324d;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      overflow-x: hidden;
    }
    .board-header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 28px;
      padding: 24px 38px;
      background: linear-gradient(135deg, #0b4f78, #1678a5);
      color: #fff;
      box-shadow: 0 5px 18px rgba(0, 39, 68, .24);
    }
    .board-title { margin: 0; font-size: clamp(30px, 3.2vw, 58px); letter-spacing: .04em; }
    .board-subtitle { margin-top: 8px; font-size: clamp(17px, 1.5vw, 26px); opacity: .92; }
    .count-panel {
      min-width: 280px;
      padding: 14px 28px 16px;
      background: rgba(255,255,255,.14);
      border: 2px solid rgba(255,255,255,.36);
      border-radius: 20px;
      text-align: center;
      backdrop-filter: blur(3px);
    }
    .count-label { font-size: clamp(19px, 1.7vw, 30px); font-weight: 700; }
    .count-number { font-size: clamp(50px, 6.2vw, 96px); line-height: 1; font-weight: 900; }
    .count-unit { font-size: clamp(20px, 1.8vw, 32px); font-weight: 700; }
    .status-bar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 38px;
      background: #fff;
      border-bottom: 1px solid #d8e1ea;
      color: #4e6477;
      font-size: clamp(15px, 1.2vw, 21px);
    }
    .main { padding: 24px 34px 34px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 16px;
    }
    .card {
      position: relative;
      overflow: hidden;
      min-height: 240px;
      background: #fff;
      border: 1px solid #d3dee8;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(29, 67, 94, .10);
    }
    .card.newest { border: 4px solid #f3b61f; box-shadow: 0 0 0 6px rgba(243,182,31,.18), 0 10px 28px rgba(29,67,94,.16); }
    .new-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 2;
      padding: 7px 12px;
      border-radius: 999px;
      background: #f3b61f;
      color: #442f00;
      font-size: 17px;
      font-weight: 900;
    }
    .signature-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 150px;
      padding: 14px;
      background: #fff;
      border-bottom: 1px solid #e2e9ef;
    }
    .signature-wrap img { display: block; width: 100%; height: 100%; object-fit: contain; }
    .missing { color: #c62828; font-size: 22px; font-weight: 800; }
    .meta { padding: 16px 18px 19px; }
    .serial { color: #0b6490; font-size: clamp(18px, 1.3vw, 26px); font-weight: 900; }
    .datetime { margin-top: 7px; color: #263f53; font-size: clamp(14px, 1vw, 18px); font-weight: 700; }

    /* 強制隱藏帶有 hidden 屬性的狀態區塊，避免 .empty/.error 的 display:flex 覆蓋 hidden。 */
    [hidden] { display: none !important; }
    .pulse { animation: pulse 1s ease; }
    @keyframes pulse { 0% { transform: scale(.97); } 55% { transform: scale(1.02); } 100% { transform: scale(1); } }
    @media (max-width: 1250px) { .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
    @media (max-width: 900px) {
      .board-header { grid-template-columns: 1fr; padding: 20px; }
      .count-panel { min-width: 0; }
      .status-bar { padding: 12px 20px; flex-direction: column; }
      .main { padding: 18px; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="board-header">
    <div>
      <h1 class="board-title">現場電子簽到看板</h1>
      <div class="board-subtitle">完成簽名後，請確認您的簽到紀錄已出現在下方</div>
    </div>
    <div class="count-panel">
      <div class="count-label">已簽到人數</div>
      <span id="totalCount" class="count-number">0</span>
      <span class="count-unit">人</span>
    </div>
  </header>

  <div class="status-bar">
    <span>最新簽到顯示於最前方｜正式版 2.2</span>
    <span id="updatedAt">資料讀取中……</span>
  </div>

  <main class="main">
    <section id="records" class="grid"></section>
  </main>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzkvvnVum5PRibGrOaVSmXIwb_we4xYn3TSny74oll9Gdec_0Y2W90lDCZJenYUfNEx/exec';

    const totalCount = document.getElementById('totalCount');
    const updatedAt = document.getElementById('updatedAt');
    const records = document.getElementById('records');

    let loading = false;
    let newestSerial = '';

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function jsonpRequest(action) {
      return new Promise(function(resolve, reject) {
        const callbackName = 'jsonp_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
        const script = document.createElement('script');
        const timer = setTimeout(function() {
          cleanup();
          reject(new Error('後台回應逾時'));
        }, 15000);

        function cleanup() {
          clearTimeout(timer);
          delete window[callbackName];
          script.remove();
        }

        window[callbackName] = function(data) {
          cleanup();
          if (data && data.success !== false) resolve(data);
          else reject(new Error((data && data.message) || '資料讀取失敗'));
        };

        script.onerror = function() {
          cleanup();
          reject(new Error('無法連線至後台'));
        };

        script.src = API_URL + '?action=' + encodeURIComponent(action) +
          '&callback=' + encodeURIComponent(callbackName) +
          '&t=' + Date.now();
        document.head.appendChild(script);
      });
    }

    function loadBoard() {
      if (loading) return;
      loading = true;

      jsonpRequest('management')
        .then(function(data) {
          loading = false;
          renderBoard(data || {});
        })
        .catch(function(err) {
          loading = false;
          updatedAt.textContent = '暫時無法更新，系統將自動重試';
          console.error(err && err.message ? err.message : err);
        });
    }

    function renderBoard(data) {
      totalCount.textContent = Number(data.count || 0);
      updatedAt.textContent = '最後更新：' + (data.updatedAt || '-');

      const rows = Array.isArray(data.records) ? data.records : [];
      records.hidden = false;
      if (rows.length === 0) {
        records.innerHTML = '';
        updatedAt.textContent = '最後更新：' + (data.updatedAt || '-');
        newestSerial = '';
        return;
      }

      const currentNewest = rows.length ? String(rows[0].serialNumber || '') : '';
      const isNewArrival = newestSerial && currentNewest && currentNewest !== newestSerial;

      records.innerHTML = rows.map(function(row, index) {
        const cacheKey = encodeURIComponent(String(row.serialNumber || '') + '_' + String(row.time || ''));
        const image = row.imageUrl
          ? '<img src="' + escapeHtml(row.imageUrl) + '&cache=' + cacheKey + '" alt="第 ' + escapeHtml(row.serialNumber) + ' 筆簽名">'
          : '<div class="missing">簽名圖片讀取中</div>';

        return '<article class="card ' + (index === 0 ? 'newest ' : '') + (isNewArrival && index === 0 ? 'pulse' : '') + '">' +
          (index === 0 ? '<div class="new-badge">最新簽到</div>' : '') +
          '<div class="signature-wrap">' + image + '</div>' +
          '<div class="meta">' +
            '<div class="serial">第 ' + escapeHtml(row.serialNumber) + ' 位</div>' +
            '<div class="datetime">' + escapeHtml(row.date) + '　' + escapeHtml(row.time) + '</div>' +
          '</div>' +
        '</article>';
      }).join('');

      newestSerial = currentNewest;
    }

    loadBoard();
    setInterval(loadBoard, 1500);
  </script>
</body>
</html>
